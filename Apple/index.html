<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f2f2f7;
            padding: 24px;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        p {
            font-size: 17px;
            color: #aeaeb2;
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
        }

        .badge {
            margin-top: 32px;
            display: inline-block;
            background: #0a84ff;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>
    <div class="logo">🍎</div>
    <h1>Apple</h1>
    <p>A Swift iOS app powered by HTML &amp; CSS as its UI source.</p>
    <span class="badge">Built with Swift &amp; WKWebView</span>
</body>
</html>
